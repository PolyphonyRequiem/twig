name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read

jobs:
  verify-ci:
    name: Verify CI green on tagged commit
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to succeed on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Tags are typically pushed after main; tolerate a short window where CI
          # for this commit is still queued or running. Refuse to publish if CI
          # ultimately fails or never appears within the deadline.
          DEADLINE=$(( $(date +%s) + 1800 ))   # 30 minutes
          POLL_INTERVAL=20

          echo "Looking up CI runs on ${REPO}@${SHA}..."

          while true; do
            RAW=$(gh api "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=1" 2>/dev/null || echo '{"workflow_runs":[]}')
            COUNT=$(echo "$RAW" | jq '.workflow_runs | length')

            if [ "$COUNT" = "0" ]; then
              STATUS="not-yet-triggered"
              CONCLUSION=""
            else
              STATUS=$(echo "$RAW" | jq -r '.workflow_runs[0].status')
              CONCLUSION=$(echo "$RAW" | jq -r '.workflow_runs[0].conclusion')
              RUN_URL=$(echo "$RAW" | jq -r '.workflow_runs[0].html_url')
            fi

            echo "[$(date -u +%H:%M:%S)] CI status=${STATUS} conclusion=${CONCLUSION:-<none>}"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "::notice::CI passed on ${SHA} — proceeding with release. Run: ${RUN_URL}"
                exit 0
              fi
              echo "::error::CI did not succeed on ${SHA} (conclusion=${CONCLUSION}). Refusing to publish a release. Run: ${RUN_URL}"
              exit 1
            fi

            if [ $(date +%s) -ge $DEADLINE ]; then
              echo "::error::Timed out waiting for CI on ${SHA} (last status=${STATUS}). Refusing to publish. Re-trigger this Release workflow once CI is green."
              exit 1
            fi

            sleep $POLL_INTERVAL
          done

  build:
    needs: verify-ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
          - rid: osx-x64
            os: macos-15
            archive: tar.gz
          - rid: osx-arm64
            os: macos-latest
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    # id-token: write is required for the win-x64 leg to obtain an OIDC token
    # for Azure Trusted Signing. The other legs ignore it. contents: read is
    # the default checkout permission and must be reasserted whenever a job
    # declares its own permissions block (otherwise the top-level grant is
    # replaced wholesale).
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - run: dotnet restore

      - run: dotnet build --no-restore

      - run: dotnet test --no-build --settings test.runsettings

      - run: dotnet publish src/Twig/Twig.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.rid }}

      - run: dotnet publish src/Twig.Mcp/Twig.Mcp.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.rid }}

      - run: dotnet publish src/Twig.Tui/Twig.Tui.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishTrimmed=false /p:PublishAot=false -o ./publish/${{ matrix.rid }}

      # Sign Windows binaries via Azure Trusted Signing (AB#3047). Runs only on
      # the win-x64 leg, and only when the AZURE_SIGNING_* repo variables are
      # set — keeps the workflow shipping unsigned Windows builds (today's
      # behaviour) until the Trusted Signing account is provisioned, then
      # automatically picks up signing once vars exist. OIDC federated
      # credential means no client secret in the repo.
      - name: Azure login (OIDC) for Trusted Signing
        if: matrix.rid == 'win-x64' && vars.AZURE_SIGNING_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_SIGNING_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_SIGNING_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SIGNING_SUBSCRIPTION_ID }}

      - name: Sign Windows binaries (Azure Trusted Signing)
        if: matrix.rid == 'win-x64' && vars.AZURE_SIGNING_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: https://wus2.codesigning.azure.net/
          trusted-signing-account-name: polyphonyrequiem
          certificate-profile-name: public-trust
          files-folder: ${{ github.workspace }}/publish/${{ matrix.rid }}
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/${{ matrix.rid }}/* -DestinationPath ./twig-${{ matrix.rid }}.zip

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf ./twig-${{ matrix.rid }}.tar.gz -C ./publish/${{ matrix.rid }} .

      - name: Compute SHA256 checksum
        shell: pwsh
        run: |
          $file = "twig-${{ matrix.rid }}.${{ matrix.archive }}"
          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
          # Standard sha256sum-compatible format: "<hash>  <filename>\n"
          # so `sha256sum -c <file>.sha256` (Linux) or `shasum -a 256 -c` (macOS) verifies directly.
          "$hash  $file" | Out-File -Encoding ascii -FilePath "$file.sha256"
          Write-Host "Wrote $file.sha256:"
          Get-Content "$file.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: twig-${{ matrix.rid }}
          path: |
            ./twig-${{ matrix.rid }}.${{ matrix.archive }}
            ./twig-${{ matrix.rid }}.${{ matrix.archive }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Aggregate SHA256SUMS manifest
        run: |
          set -euo pipefail
          cd ./artifacts
          # Order deterministically so the manifest is reproducible across builds.
          # Each per-asset .sha256 is already in `<hash>  <filename>` format, so a
          # plain concat yields a valid sha256sum-compatible manifest:
          # `sha256sum -c SHA256SUMS` will verify every listed asset.
          ls -1 *.sha256 | sort | xargs cat > SHA256SUMS
          echo "::group::SHA256SUMS contents"
          cat SHA256SUMS
          echo "::endgroup::"

      - name: Generate changelog
        run: |
          CURRENT_TAG=${GITHUB_REF_NAME}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi
          COMMITS=$(git log ${RANGE} --pretty=format:"- %s (%h)")
          : > release_notes.md
          for TYPE in breaking feat fix docs chore refactor perf test ci build; do
            if [ "$TYPE" = "breaking" ]; then
              LINES=$(echo "$COMMITS" | grep -E "^- (breaking[:(]|[a-z]+![:(])" || true)
            else
              LINES=$(echo "$COMMITS" | grep -E "^- ${TYPE}[:(]" || true)
            fi
            if [ -n "$LINES" ]; then
              echo "### ${TYPE}" >> release_notes.md
              echo "$LINES" >> release_notes.md
              echo "" >> release_notes.md
            fi
          done
          if [ ! -s release_notes.md ]; then
            echo "- Initial release" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            ./artifacts/twig-win-x64.zip
            ./artifacts/twig-win-x64.zip.sha256
            ./artifacts/twig-linux-x64.tar.gz
            ./artifacts/twig-linux-x64.tar.gz.sha256
            ./artifacts/twig-osx-x64.tar.gz
            ./artifacts/twig-osx-x64.tar.gz.sha256
            ./artifacts/twig-osx-arm64.tar.gz
            ./artifacts/twig-osx-arm64.tar.gz.sha256
            ./artifacts/SHA256SUMS

  nuget:
    name: Publish NuGet packages
    needs: verify-ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Pack libraries
        run: |
          set -euo pipefail
          dotnet pack src/Twig.Domain/Twig.Domain.csproj         -c Release -o ./nupkgs
          dotnet pack src/Twig.Infrastructure/Twig.Infrastructure.csproj -c Release -o ./nupkgs
          ls -la ./nupkgs

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Provision an API key on nuget.org and add it to the repo's Actions secrets."
            exit 1
          fi
          # --skip-duplicate makes re-runs safe (same version already pushed → no error).
          # *.nupkg matches both .nupkg and .snupkg, which the push command auto-pairs.
          dotnet nuget push "./nupkgs/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./nupkgs/

