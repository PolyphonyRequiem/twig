name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
          - rid: osx-x64
            os: macos-15
            archive: tar.gz
          - rid: osx-arm64
            os: macos-latest
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - run: dotnet restore

      - run: dotnet build --no-restore

      - run: dotnet test --no-build --settings test.runsettings

      - run: dotnet publish src/Twig/Twig.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.rid }}

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/${{ matrix.rid }}/* -DestinationPath ./twig-${{ matrix.rid }}.zip

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf ./twig-${{ matrix.rid }}.tar.gz -C ./publish/${{ matrix.rid }} .

      - uses: actions/upload-artifact@v4
        with:
          name: twig-${{ matrix.rid }}
          path: ./twig-${{ matrix.rid }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate changelog
        run: |
          CURRENT_TAG=${GITHUB_REF_NAME}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi
          COMMITS=$(git log ${RANGE} --pretty=format:"- %s (%h)")
          : > release_notes.md
          for TYPE in breaking feat fix docs chore refactor perf test ci build; do
            if [ "$TYPE" = "breaking" ]; then
              LINES=$(echo "$COMMITS" | grep -E "^- (breaking[:(]|[a-z]+![:(])" || true)
            else
              LINES=$(echo "$COMMITS" | grep -E "^- ${TYPE}[:(]" || true)
            fi
            if [ -n "$LINES" ]; then
              echo "### ${TYPE}" >> release_notes.md
              echo "$LINES" >> release_notes.md
              echo "" >> release_notes.md
            fi
          done
          if [ ! -s release_notes.md ]; then
            echo "- Initial release" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            ./artifacts/twig-win-x64.zip
            ./artifacts/twig-linux-x64.tar.gz
            ./artifacts/twig-osx-x64.tar.gz
            ./artifacts/twig-osx-arm64.tar.gz
